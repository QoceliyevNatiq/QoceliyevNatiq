<svg width="860" height="300" viewBox="0 0 860 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Kali Linux dragon neon animation">
  <defs>
    <filter id="softGlow" x="-80%" y="-80%" width="260%" height="260%">
